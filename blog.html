<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Antigravity</title>
  <style>
    :root { --gold: #c9a84c; --bg: #0a0a0a; --text: #e8e8e8; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; }
    header { padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    header a { color: var(--gold); text-decoration: none; font-size: 1.2rem; font-weight: bold; }
    main { max-width: 760px; margin: 4rem auto; padding: 0 2rem; }
    h1 { font-size: 2rem; margin-bottom: 2rem; border-bottom: 1px solid var(--gold); padding-bottom: 1rem; }
    #posts-list { display: flex; flex-direction: column; gap: 2rem; }
    .post-card { border: 1px solid rgba(255,255,255,0.1); padding: 1.5rem; border-radius: 8px; }
    .post-card h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
    .post-card a { color: var(--gold); text-decoration: none; }
    .post-card a:hover { text-decoration: underline; }
    .post-date { font-size: 0.85rem; opacity: 0.6; margin-top: 0.5rem; }
    #loading { text-align: center; opacity: 0.6; padding: 2rem; }
  </style>
</head>
<body>
  <header>
    <a href="/">← Antigravity</a>
  </header>
  <main>
    <h1>Blog</h1>
    <div id="posts-list"><p id="loading">Loading posts...</p></div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script>
    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    async function loadPosts() {
      const { data, error } = await window.db
        .from('blog_posts')
        .select('title, slug, published_at')
        .order('published_at', { ascending: false });
      const container = document.getElementById('posts-list');
      if (error || !data || data.length === 0) {
        container.innerHTML = '<p style="opacity:0.6">No posts yet.</p>';
        return;
      }
      container.innerHTML = data.map(p => `
        <div class="post-card">
          <h2><a href="/post.html?slug=${encodeURIComponent(p.slug)}">${esc(p.title)}</a></h2>
          ${p.published_at ? `<p class="post-date">${new Date(p.published_at).toLocaleDateString('en-GB', { year:'numeric', month:'long', day:'numeric' })}</p>` : ''}
        </div>
      `).join('');
    }
    loadPosts();
  </script>
</body>
</html>
