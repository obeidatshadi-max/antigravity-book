<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity Book</title>
</head>
<body>
  <section class="hero" style="padding:3rem 1rem;text-align:center;">
    <h1>Welcome to the Antigravity Book Site</h1>
    <p>This site is powered by Supabase.</p>
    <div class="hero-cta" style="margin-top:2rem;">
      <button style="padding:0.6rem 1.4rem;border-radius:6px;border:none;background:var(--gold,#c9a84c);color:#000;font-weight:600;cursor:pointer;font-size:0.95rem;margin:0 0.5rem;">Explore the Book</button>
      <button style="padding:0.6rem 1.4rem;border-radius:6px;border:1px solid var(--gold,#c9a84c);background:transparent;color:inherit;font-weight:600;cursor:pointer;font-size:0.95rem;margin:0 0.5rem;">Enter the System</button>
    </div>
    <form data-type="email-capture" data-source="hero" style="margin-top:1.5rem;display:flex;gap:0.5rem;flex-wrap:wrap;justify-content:center;">
      <input type="email" name="email" placeholder="Your email address" required
        style="padding:0.6rem 1rem;border-radius:6px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:inherit;font-size:0.95rem;min-width:220px;">
      <button type="submit"
        style="padding:0.6rem 1.4rem;border-radius:6px;border:none;background:var(--gold,#c9a84c);color:#000;font-weight:600;cursor:pointer;font-size:0.95rem;">
        Stay Updated
      </button>
    </form>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/forms.js"></script>
</body>
</html>
